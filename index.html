
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S2DR4 Pro Viewer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        /* Contenedor del Comparador */
        .comparison-slider { position: relative; width: 100%; height: 100vh; }
        .image-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .image-box img { height: 100%; width: auto; min-width: 100%; object-fit: contain; }
        
        #after-image { z-index: 2; width: 50%; border-right: 2px solid white; }
        #before-image { z-index: 1; }

        /* Menú Lateral Superior Izquierdo */
        .menu-layers { position: absolute; top: 10px; left: 10px; z-index: 10; background: white; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.3); width: 120px; }
        .menu-layers button { width: 100%; border: none; background: none; padding: 12px; text-align: left; font-size: 11px; font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; color: #555; }
        .menu-layers button:last-child { border-bottom: none; }
        .menu-layers button.active { background: #3182ce; color: white; }
        .menu-layers button:hover { background: #f5f5f5; color: #000; }

        /* Botón Superior Derecho */
        .top-right-badge { position: absolute; top: 10px; right: 10px; z-index: 10; background: #3182ce; color: white; padding: 8px 25px; border-radius: 4px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: default; }

        /* Logos Inferiores */
        .mapbox-logo { position: absolute; bottom: 10px; left: 10px; z-index: 10; color: white; font-weight: bold; font-style: italic; font-size: 18px; opacity: 0.8; letter-spacing: -1px; }
        .credits { position: absolute; bottom: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.5); color: #ccc; padding: 3px 8px; font-size: 10px; border-radius: 3px; }

        /* Slider Handle */
        .slider-handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: #3182ce; border: 3px solid white; border-radius: 50%; z-index: 100; cursor: ew-resize; display: flex; align-items: center; justify-content: center; }
        .slider-handle::before { content: '◀ ▶'; color: white; font-size: 12px; }
    </style>
</head>
<body>

    <div class="top-right-badge">S2DR4</div>

    <div class="menu-layers">
        <button onclick="changeLayer('rgb', this)">S2 RGB</button>
        <button onclick="changeLayer('ndvi', this)">S2 NDVI</button>
        <button onclick="changeLayer('irp', this)">S2 B11,B8,B5</button>
        <button class="active" onclick="changeLayer('ndpi', this)">S2 NDPI MORFO</button>
    </div>

    <div class="comparison-slider" id="slider-container">
        <div class="image-box" id="after-image">
            <img id="layer-right" src="https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/ndpi.png">
        </div>
        <div class="image-box" id="before-image">
            <img src="https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/rgb.png">
        </div>
        <div class="slider-handle" id="handle"></div>
    </div>

    <div class="mapbox-logo">mapbox</div>
    <div class="credits">© ESA | © Gamma Earth | Copernicus</div>

    <script>
        const urls = {'irp': 'https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/irp.png', 'ndvi': 'https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/ndvi.png', 'ndpi': 'https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/ndpi.png', 'rgb': 'https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/rgb.png'};
        const container = document.getElementById('slider-container');
        const afterImg = document.getElementById('after-image');
        const handle = document.getElementById('handle');
        const layerRight = document.getElementById('layer-right');

        // Lógica del Slider
        let isResizing = false;

        function updateSlider(x) {
            let rect = container.getBoundingClientRect();
            let position = ((x - rect.left) / rect.width) * 100;
            if (position < 0) position = 0;
            if (position > 100) position = 100;
            afterImg.style.width = position + "%";
            handle.style.left = position + "%";
        }

        container.addEventListener('mousedown', () => isResizing = true);
        window.addEventListener('mouseup', () => isResizing = false);
        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            updateSlider(e.clientX);
        });

        // Soporte Táctil
        container.addEventListener('touchstart', () => isResizing = true);
        window.addEventListener('touchend', () => isResizing = false);
        window.addEventListener('touchmove', (e) => {
            if (!isResizing) return;
            updateSlider(e.touches[0].clientX);
        });

        // Cambio de Capas
        function changeLayer(id, btn) {
            layerRight.src = urls[id];
            document.querySelectorAll('.menu-layers button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        // Posición inicial
        updateSlider(window.innerWidth / 2);
    </script>
</body>
</html>
