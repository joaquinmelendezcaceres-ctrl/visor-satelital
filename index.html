<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Visor S2DR3 - 2026-01-04</title>
    <style>
        body { background:#0f172a; color:white; font-family:sans-serif; text-align:center; margin:0; }
        header { background:#1e293b; padding:15px; border-bottom: 2px solid #3b82f6; }
        .btn-group { margin: 15px; }
        button { padding:12px 20px; cursor:pointer; background:#334155; color:white; border:none; border-radius:8px; font-weight:bold; transition: 0.3s; }
        button.active { background:#2563eb; box-shadow: 0 0 15px #2563eb; }
        img { max-width:90%; border-radius:15px; margin:20px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <header>
        <h2>Visor Satelital 1m</h2>
        <p>Ubicación: (-81.11141, -5.09828) | Fecha: 2026-01-04</p>
    </header>
    <div class="btn-group">
        <button class="active" onclick="sw('rgb', this)">RGB</button>
        <button onclick="sw('ndvi', this)">NDVI</button>
        <button onclick="sw('irp', this)">B11,B8,B5</button>
        <button onclick="sw('ndpi', this)">NDPI Morfo</button>
    </div>
    <img id="view" src="https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/rgb.png">
    <script>
        const U = {'rgb': 'https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/rgb.png', 'ndvi': 'https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/ndvi.png', 'irp': 'https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/irp.png', 'ndpi': 'https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/capas/ndpi.png'};
        function sw(id, b) {
            document.getElementById('view').src = U[id];
            document.querySelectorAll('button').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
        }
    </script>
</body>
</html>
