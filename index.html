<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Satelital S2DR3 (4 Capas)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b111e;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.01em;
        }
        .badge-tile {
            background-color: #3b82f6;
            color: #ffffff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-family: monospace;
            margin-left: 8px;
        }
        .button-panel {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .button-panel button {
            padding: 8px 16px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            cursor: pointer;
            background: #1e293b;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 550;
            border-radius: 8px;
            transition: all 0.2s ease-in-out;
        }
        .button-panel button:hover {
            background: #334155;
            color: #f1f5f9;
        }
        .button-panel button.active {
            background: #2563eb;
            color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(37,99,235,0.4);
        }
        .button-panel button.ndpi.active {
            background: #7c3aed;
            border-color: #8b5cf6;
            box-shadow: 0 0 12px rgba(124,58,237,0.4);
        }
        .image-container {
            flex: 1;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #070a13;
            overflow: hidden;
            padding: 16px;
        }
        .main-image {
            max-width: 100%;
            max-height: calc(100vh - 120px);
            object-fit: contain;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-radius: 12px;
            border: 1px solid rgba(51, 65, 85, 0.3);
            display: block;
            opacity: 1;
            transition: opacity 0.2s ease-in-out;
        }
        footer {
            background: rgba(15, 23, 42, 0.95);
            color: #64748b;
            font-size: 11px;
            padding: 10px;
            text-align: center;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center;">
            <h1>Visor de Productos Satelitales S2DR3</h1>
            <span class="badge-tile">Tile: PE-T18LWL</span>
        </div>
        
        <div class="button-panel">
            <button class="active" onclick="switchLayer('rgb', this)">S2 RGB (Color Real)</button>
            <button onclick="switchLayer('ndvi', this)">S2 NDVI (Vegetación)</button>
            <button onclick="switchLayer('irp', this)">S2 IRP (Humedad/Suelo)</button>
            <button class="ndpi" onclick="switchLayer('ndpi', this)">NDPI Morfológico</button>
        </div>
    </header>

    <div class="image-container">
        <img id="main-viewport" class="main-image" src="https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/imagenes_satelitales/rgb.png" alt="Capa Satelital S2">
    </div>

    <footer>
        Visualisor Científico Estático • 100% Optimizado libre de sobrecarga Base64 • Sentinel-2
    </footer>

    <script>
        // Enlaces de imágenes estáticos subidos de forma segura a GitHub
        const LAYERS_DB = {
            rgb: "https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/imagenes_satelitales/rgb.png",
            ndvi: "https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/imagenes_satelitales/ndvi.png",
            irp: "https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/imagenes_satelitales/irp.png",
            ndpi: "https://raw.githubusercontent.com/joaquinmelendezcaceres-ctrl/visor-satelital/main/imagenes_satelitales/ndpi.png"
        };

        const viewport = document.getElementById('main-viewport');

        function switchLayer(layerId, buttonEl) {
            if (!LAYERS_DB[layerId]) return;
            
            // Animación de atenuación fluida
            viewport.style.opacity = '0.3';
            
            setTimeout(() => {
                viewport.src = LAYERS_DB[layerId];
                viewport.style.opacity = '1';
                
                // Actualizar estado activo de los botones
                document.querySelectorAll('.button-panel button').forEach(btn => {
                    btn.classList.remove('active');
                });
                buttonEl.classList.add('active');
            }, 150);
        }
    </script>
</body>
</html>
